<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tasks | Eodbod</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="images/logo-mark.png" type="image/png" />
  <style>
    .tasks-table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(15,23,42,0.06);
      overflow: hidden;
    }
    .tasks-table th, .tasks-table td {
      padding: 1em 0.75em;
      text-align: left;
    }
    .tasks-table th {
      background: var(--bg-alt);
      color: var(--text);
      font-size: 1.05em;
      font-weight: 700;
      border-bottom: 2px solid var(--border);
    }
    .tasks-table td {
      border-bottom: 1px solid var(--border);
      font-size: 1em;
      color: var(--text);
    }
    .tasks-table tr:last-child td {
      border-bottom: none;
    }
    .tasks-table td.message {
      max-width: 320px;
      white-space: pre-line;
      word-break: break-word;
    }
    .tasks-table td.date {
      color: var(--text-muted);
      font-size: 0.97em;
    }
    .tasks-table tbody tr:hover {
      background: var(--orange-muted);
      transition: background 0.2s;
    }
    .tasks-section h2 {
      text-align: center;
      font-size: 2em;
      margin-bottom: 1.5em;
    }
    @media (max-width: 700px) {
      .container {
        padding: 0 0.5em;
      }
      .tasks-table,
      .tasks-table thead,
      .tasks-table tbody,
      .tasks-table tr {
        display: block;
        width: 100%;
      }
      .tasks-table thead {
        display: none;
      }
      .tasks-table tr {
        margin-bottom: 1.2em;
        background: #fff;
        border-radius: 10px;
        box-shadow: 0 1px 4px rgba(15,23,42,0.07);
        padding: 0.5em 0.7em;
      }
      .tasks-table td {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.5em 0;
        border: none;
        font-size: 1em;
        border-bottom: 1px solid #f3f3f3;
      }
      .tasks-table td:last-child {
        border-bottom: none;
      }
      .tasks-table td::before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-muted);
        flex: 0 0 45%;
        text-align: left;
        padding-right: 0.5em;
      }
      .tasks-table td.message {
        max-width: 100%;
        word-break: break-word;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="logo-site" href="index.html#top" aria-label="eodbod.com — Home">
        <img class="logo-mark" src="images/logo-mark.png" alt="" width="120" height="80" decoding="async" fetchpriority="high" aria-hidden="true" />
        <span class="logo-wordmark">eodbod.com</span>
      </a>
      <nav class="nav-main" aria-label="Main">
        <a href="index.html#top">Home</a>
        <a href="index.html#about">About</a>
        <a href="index.html#services">Services</a>
        <a href="index.html#faq">FAQ</a>
        <a href="index.html#contact">Contact</a>
        <a href="index.html#contact">Book a task</a>
        <a class="nav-call" href="tel:8433856770" title="Tap to call eodbod">Call us · 8433856770</a>
        <a class="nav-tasks" href="tasks.html">Tasks</a>
      </nav>
    </div>
  </header>
  <main id="main">
    <section id="tasks" class="tasks-section" style="padding: 2em 0; background: var(--bg-alt);">
      <div class="container" style="max-width: 800px; margin: 0 auto;">
        <h2 style="margin-bottom:1em;">Submitted Tasks</h2>
        <div id="tasks-list">
          <p>Loading tasks...</p>
        </div>
      </div>
    </section>
  </main>
  <script>
    (function fetchTasks() {
      var tasksSection = document.getElementById("tasks-list");
      if (!tasksSection) return;
      fetch("http://127.0.0.1:8000/admin/submissions")
        .then(function (res) { return res.json(); })
        .then(function (tasks) {
          if (!tasks.length) {
            tasksSection.innerHTML = "<p>No tasks submitted yet.</p>";
            return;
          }
          var html = '<table class="tasks-table">';
          html += '<thead><tr><th>Name</th><th>Number</th><th>Location</th><th>Message</th><th>Urgency</th><th>Date</th></tr></thead><tbody>';
          tasks.forEach(function (t) {
            html += `<tr>
              <td data-label="Name">${t.name||""}</td>
              <td data-label="Number">${t.phone||""}</td>
              <td data-label="Location">${t.location||""}</td>
              <td class="message" data-label="Message">${t.message||""}</td>
              <td data-label="Urgency">${t.urgency||""}</td>
              <td class="date" data-label="Date">${(t.created_at||"").replace("T"," ").slice(0,19)}</td>
            </tr>`;
          });
          html += '</tbody></table>';
          tasksSection.innerHTML = html;
        })
        .catch(function () {
          tasksSection.innerHTML = "<p style='color:red;'>Could not load tasks. Backend may be down.</p>";
        });
    })();
  </script>
</body>
</html>
