name: Deploy to AWS EC2 (Manual Trigger)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (backend)
        run: |
          cd 2026-eodbod/backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dependencies (frontend)
        run: |
          cd 2026-eodbod/frontend
          npm install

      - name: Build frontend
        run: |
          cd 2026-eodbod/frontend
          npm run build || echo "No build script defined"

      - name: Deploy to AWS EC2 and setup
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_EC2_HOST }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          port: ${{ secrets.AWS_EC2_PORT }}
          script: |
            # Install Nginx, Certbot, and Python if not present
            sudo apt-get update
            sudo apt-get install -y nginx python3-pip python3-venv certbot python3-certbot-nginx
            # Setup backend
            cd ~/eodbod || (git clone https://github.com/${{ github.repository }}.git ~/eodbod && cd ~/eodbod)
            git pull origin main
            cd 2026-eodbod/backend
            python3 -m venv venv
            source venv/bin/activate
            pip install -r requirements.txt
            # Setup systemd service for backend
            echo "[Unit]
Description=Eodbod Flask Backend
After=network.target
[Service]
User=${USER}
WorkingDirectory=~/eodbod/2026-eodbod/backend
ExecStart=~/eodbod/2026-eodbod/backend/venv/bin/python3 form_api.py
Restart=always
[Install]
WantedBy=multi-user.target" | sudo tee /etc/systemd/system/eodbod-backend.service
            sudo systemctl daemon-reload
            sudo systemctl enable eodbod-backend
            sudo systemctl restart eodbod-backend
            # Build and deploy frontend static files
            cd ~/eodbod/2026-eodbod/frontend
            npm install
            npm run build || echo "No build script defined"
            sudo mkdir -p /var/www/html
            sudo cp -r dist/* /var/www/html/
            # Configure Nginx for HTTP and HTTPS
            sudo bash -c 'cat > /etc/nginx/sites-available/default' <<EOF
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name eodbod.com www.eodbod.com;
    root /var/www/html;
    index index.html;
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /admin/ {
        proxy_pass http://127.0.0.1:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location / {
        try_files $uri $uri/ =404;
    }
}
EOF
            sudo systemctl restart nginx
            # Obtain and install SSL certificate with Certbot
            sudo certbot --nginx --non-interactive --agree-tos --redirect -d eodbod.com -d www.eodbod.com -m ${{ secrets.SSL_EMAIL }}
            echo "Deployed and running with HTTPS!"
